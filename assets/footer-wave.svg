<svg viewBox="0 0 1500 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="160" fill="#050014"/>

  <path fill="url(#waveGrad2)" opacity="0.35">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="
      M0,90 C 250,140 450,40 750,80 C 1050,120 1250,40 1500,90 L1500,160 L0,160 Z;
      M0,80 C 250,40 450,140 750,90 C 1050,40 1250,120 1500,70 L1500,160 L0,160 Z;
      M0,90 C 250,140 450,40 750,80 C 1050,120 1250,40 1500,90 L1500,160 L0,160 Z"/>
  </path>

  <path fill="url(#waveGrad1)" opacity="0.6">
    <animate attributeName="d" dur="7s" repeatCount="indefinite"
      values="
      M0,110 C 300,70 500,150 800,110 C 1100,70 1300,130 1500,100 L1500,160 L0,160 Z;
      M0,100 C 300,150 500,70 800,120 C 1100,150 1300,80 1500,120 L1500,160 L0,160 Z;
      M0,110 C 300,70 500,150 800,110 C 1100,70 1300,130 1500,100 L1500,160 L0,160 Z"/>
  </path>

  <text x="750" y="45" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" fill="#E9E4FF" opacity="0.85">
    Thanks for visiting my profile ✨
  </text>
</svg>

<svg viewBox="0 0 1500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050014"/>
      <stop offset="50%" stop-color="#150638"/>
      <stop offset="100%" stop-color="#050014"/>
    </linearGradient>
    <radialGradient id="glowSpotA" cx="15%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSpotB" cx="90%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#A855F7" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1500" height="300" fill="url(#bgBase)"/>
  <rect width="1500" height="300" fill="url(#grid)"/>
  <rect width="1500" height="300" fill="url(#glowSpotA)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect width="1500" height="300" fill="url(#glowSpotB)">
    <animate attributeName="opacity" values="1;0.6;1" dur="7s" repeatCount="indefinite"/>
  </rect>

  <g fill="#ffffff" opacity="0.5">
    <circle cx="100" cy="60" r="1.4"><animate attributeName="cy" values="60;40;60" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="220" r="1.6"><animate attributeName="cy" values="220;200;220" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="80" r="1.3"><animate attributeName="cy" values="80;60;80" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="240" r="1.7"><animate attributeName="cy" values="240;220;240" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="1400" cy="100" r="1.4"><animate attributeName="cy" values="100;80;100" dur="5.2s" repeatCount="indefinite"/></circle>
  </g>
</svg>
